<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>shivaaytech.in</title>

<!-- Browser Tab Logo -->
<link rel="icon" type="image/png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    position:relative;
    overflow:hidden;
}

/* Background Logo */
body::before{
    content:'';
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:550px;
    height:550px;
    background:url('logo.png') center/contain no-repeat;
    opacity:.04;
    z-index:-1;
}

.container{
    text-align:center;
    width:100%;
    max-width:760px;
}

/* top artwork */
.hero{
    position:relative;
    margin-bottom:25px;
    height:160px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.blob{
    position:absolute;
    width:210px;
    height:120px;
    background:#c9f2f0;
    border-radius:58% 42% 63% 37% / 45% 55% 45% 55%;
}

.blob::before,
.blob::after{
    content:'';
    position:absolute;
    background:#c9f2f0;
    border-radius:50%;
}

.blob::before{
    width:14px;
    height:14px;
    top:-18px;
    right:35px;
}

.blob::after{
    width:10px;
    height:10px;
    bottom:-16px;
    left:40px;
}

.laptop{
    position:relative;
    z-index:2;
    font-size:95px;
    color:#2d2d2d;
}

/* card */
.card{
    background:#fff;
    max-width:520px;
    margin:auto;
    border-radius:26px;
    padding:40px 42px;
    box-shadow:
    0 0 0 1px rgba(0,0,0,.03),
    0 20px 40px rgba(0,0,0,.04);
}

/* front logo */
.card-logo{
    width:75px;
    margin-bottom:20px;
    object-fit:contain;
}

/* blue icon */
.icon-box{
    width:64px;
    height:64px;
    margin:auto;
    border-radius:18px;
    background:linear-gradient(135deg,#3195ff,#2970ff);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:28px;
    box-shadow:0 12px 25px rgba(49,149,255,.22);
}

/* badge */
.badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:18px;
    padding:8px 16px;
    background:#f0f5ff;
    color:#2d6bff;
    border-radius:30px;
    font-size:13px;
    font-weight:500;
}

.badge span{
    width:7px;
    height:7px;
    background:#2d6bff;
    border-radius:50%;
}

h1{
    margin-top:28px;
    font-size:38px;
    font-weight:500;
    color:#1b2332;
    letter-spacing:-0.5px;
}

.desc{
    margin-top:18px;
    color:#7c879c;
    font-size:15px;
    line-height:1.9;
    max-width:410px;
    margin-left:auto;
    margin-right:auto;
}

.line{
    height:1px;
    background:#edf1f6;
    margin:32px 0 20px;
}

.note{
    color:#a7b0c0;
    font-size:14px;
    margin-bottom:30px;
}

.btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    background:#0c4ca3;
    color:#fff;
    padding:14px 26px;
    border-radius:8px;
    font-size:14px;
    font-weight:500;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

@media(max-width:600px){

    .card{
        padding:30px 25px;
    }

    h1{
        font-size:30px;
    }

    .laptop{
        font-size:75px;
    }

    .card-logo{
        width:60px;
    }
}

</style>
</head>
<body>

<div class="container">

    <!-- top image -->
    <div class="hero">

        <div class="blob"></div>

        <div class="laptop">
            <i class="fa-solid fa-laptop-code"></i>
        </div>

    </div>

    <!-- main card -->
    <div class="card">

        <!-- Front Logo -->
        <img src="logo.png" class="card-logo">

        <div class="icon-box">
            <i class="fa-regular fa-clock"></i>
        </div>

        <div class="badge">
            <span></span>
            Scheduled Maintenance
        </div>

        <h1>We'll be back soon</h1>

        <div class="desc">
            Our platform is currently undergoing scheduled maintenance
            to improve performance, reliability, and your overall
            experience. Please check back shortly.
        </div>

        <div class="line"></div>

        <div class="note">
            Thank you for your patience.
        </div>

        <a href="https://shivaaytech.in" class="btn">
            <i class="fa-solid fa-house"></i>
            Return to Website
        </a>

    </div>

</div>

</body>
</html>
