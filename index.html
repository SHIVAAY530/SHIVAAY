<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shivaay Tech</title>

<!-- Browser Tab Logo -->
<link rel="icon" type="image/png" href="image/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    position:relative;
    overflow:hidden;
}

/* Background Logo Watermark */
body::before{
    content:'';
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    
    width:700px;
    height:700px;

    background:url('image/logo.png') center/contain no-repeat;

    opacity:.14;
    z-index:-1;
}

/* Container */
.container{
    text-align:center;
    width:100%;
    max-width:800px;
}

/* Top Artwork */
.hero{
    position:relative;
    height:170px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:25px;
}

.blob{
    position:absolute;
    width:220px;
    height:130px;
    background:#d8f6f3;
    border-radius:58% 42% 63% 37% / 45% 55% 45% 55%;
}

.laptop{
    position:relative;
    z-index:2;
    font-size:95px;
    color:#2d2d2d;
}

/* Main Card */
.card{
    background:#fff;
    max-width:560px;
    margin:auto;
    border-radius:28px;
    padding:45px;
    box-shadow:
    0 5px 20px rgba(0,0,0,.04),
    0 25px 50px rgba(0,0,0,.06);
}

/* Front Logo */
.card-logo{
    width:90px;
    margin-bottom:22px;
}

/* Icon */
.icon-box{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:20px;
    background:linear-gradient(135deg,#3195ff,#2970ff);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:30px;
    box-shadow:0 12px 25px rgba(49,149,255,.25);
}

/* Badge */
.badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:20px;
    padding:8px 18px;
    background:#f0f5ff;
    color:#2d6bff;
    border-radius:30px;
    font-size:13px;
    font-weight:500;
}

.badge span{
    width:8px;
    height:8px;
    background:#2d6bff;
    border-radius:50%;
}

h1{
    margin-top:28px;
    font-size:38px;
    color:#1b2332;
    font-weight:600;
}

.desc{
    margin-top:18px;
    color:#7c879c;
    font-size:15px;
    line-height:1.9;
}

.line{
    height:1px;
    background:#edf1f6;
    margin:30px 0;
}

/* Email */
.email{
    display:inline-flex;
    align-items:center;
    gap:10px;
    color:#0c4ca3;
    text-decoration:none;
    font-weight:500;
    margin-bottom:30px;
    font-size:15px;
}

.email:hover{
    text-decoration:underline;
}

/* Button */
.btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    background:#0c4ca3;
    color:#fff;
    padding:14px 28px;
    border-radius:10px;
    font-size:14px;
    font-weight:500;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

@media(max-width:600px){

    .card{
        padding:30px 22px;
    }

    h1{
        font-size:30px;
    }

    .laptop{
        font-size:70px;
    }

    .card-logo{
        width:70px;
    }
}

</style>
</head>
<body>

<div class="container">

    <!-- Top Icon -->
    <div class="hero">
        <div class="blob"></div>

        <div class="laptop">
            <i class="fa-solid fa-laptop-code"></i>
        </div>
    </div>

    <!-- Main Card -->
    <div class="card">

        <!-- Logo -->
        <img src="image/logo.png" class="card-logo" alt="logo">

        <!-- Icon -->
        <div class="icon-box">
            <i class="fa-regular fa-clock"></i>
        </div>

        <!-- Badge -->
        <div class="badge">
            <span></span>
            Scheduled Maintenance
        </div>

        <!-- Heading -->
        <h1>We'll be back soon</h1>

        <!-- Description -->
        <div class="desc">
            Our platform is currently undergoing scheduled maintenance
            to improve performance, security, and your overall
            experience. Please check back shortly.
        </div>

        <div class="line"></div>

        <!-- Email -->
        <a href="mailto:contact@shivaaytech.in" class="email">
            <i class="fa-solid fa-envelope"></i>
            contact@shivaaytech.in
        </a>

        <br>

        <!-- Button -->
        <a href="https://shivaaytech.in" class="btn">
            <i class="fa-solid fa-house"></i>
            Return to Website
        </a>

    </div>

</div>

</body>
</html>
