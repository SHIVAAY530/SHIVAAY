<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shivaay Tech</title>

<link rel="icon" type="image/png" href="image/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#eef4ff,#f8fbff);
}

/* Container */
.container{
    width:100%;
    max-width:650px;
}

/* Glass Card */
.card{

    width:100%;
    text-align:center;

    background:rgba(255,255,255,.55);

    border:1px solid rgba(255,255,255,.7);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border-radius:30px;

    padding:clamp(30px,5vw,55px);

    box-shadow:
    0 8px 32px rgba(0,0,0,.08);
}

/* Logo Circle */
.logo-box{

    width:100px;
    height:100px;

    margin:auto;

    border-radius:50%;

    background:rgba(255,255,255,.85);

    border:1px solid rgba(255,255,255,.8);

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
    0 10px 30px rgba(0,0,0,.08);
}

.logo-box img{
    width:70%;
    object-fit:contain;
}

/* Badge */
.badge{

    margin-top:22px;

    display:inline-flex;
    align-items:center;
    gap:8px;

    padding:8px 18px;

    border-radius:30px;

    background:#edf4ff;

    color:#296dff;

    font-size:13px;
    font-weight:600;
}

.badge span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#296dff;
}

/* Heading */
h1{
    margin-top:25px;

    font-size:clamp(28px,5vw,42px);

    color:#162033;

    font-weight:600;
}

/* Description */
.desc{

    margin-top:18px;

    color:#5f6f86;

    font-size:clamp(14px,2vw,16px);

    line-height:1.8;

    max-width:470px;

    margin-left:auto;
    margin-right:auto;
}

/* Divider */
.line{
    margin:32px auto;
    height:1px;
    background:rgba(0,0,0,.08);
}

/* Email */
.email{
    display:inline-flex;
    align-items:center;
    gap:10px;

    text-decoration:none;

    color:#0c4ca3;

    font-weight:500;

    font-size:clamp(14px,2vw,16px);

    margin-bottom:28px;

    word-break:break-word;
}

.email:hover{
    text-decoration:underline;
}

/* Button */
.btn{
    display:inline-flex;
    align-items:center;
    gap:10px;

    text-decoration:none;

    background:#0c4ca3;
    color:#fff;

    padding:14px 28px;

    border-radius:12px;

    font-size:14px;
    font-weight:500;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

@media(max-width:480px){

    .logo-box{
        width:80px;
        height:80px;
    }

    .btn{
        width:100%;
        justify-content:center;
    }

    .email{
        justify-content:center;
        text-align:center;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="card">

        <!-- Logo -->
        <div class="logo-box">
            <img src="image/logo.png" alt="Logo">
        </div>

        <!-- Badge -->
        <div class="badge">
            <span></span>
            Scheduled Maintenance
        </div>

        <!-- Heading -->
        <h1>We'll be back soon</h1>

        <!-- Description -->
        <div class="desc">
            Our platform is currently undergoing scheduled maintenance
            to improve performance, security and reliability.
            Please check back shortly.
        </div>

        <div class="line"></div>

        <!-- Email -->
        <a href="mailto:contact@shivaaytech.in" class="email">
            <i class="fa-solid fa-envelope"></i>
            contact@shivaaytech.in
        </a>

        <br>

        <!-- Button -->
        <a href="https://shivaaytech.in" class="btn">
            <i class="fa-solid fa-house"></i>
            Return to Website
        </a>

    </div>

</div>

</body>
</html>
