<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shivaay Tech</title>

<link rel="icon" type="image/png" href="image/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    position:relative;
    overflow:hidden;
    background:linear-gradient(135deg,#eef4ff,#f8fbff);
}

/* Background logo */
body::before{
    content:'';
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:min(70vw,700px);
    height:min(70vw,700px);

    background:url('image/logo.png') center/contain no-repeat;

    opacity:.12;
    z-index:0;
}

/* Main container */
.container{
    width:100%;
    max-width:650px;
    position:relative;
    z-index:2;
}

/* Glass card */
.card{
    width:100%;
    text-align:center;

    background:rgba(255,255,255,.35);

    border:1px solid rgba(255,255,255,.4);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border-radius:30px;

    padding:clamp(30px,5vw,55px);

    box-shadow:
    0 8px 32px rgba(0,0,0,.08);
}

/* Icon */
.icon-box{
    width:75px;
    height:75px;
    margin:auto;

    border-radius:22px;

    background:linear-gradient(135deg,#2d8cff,#296dff);

    display:flex;
    justify-content:center;
    align-items:center;

    color:#fff;
    font-size:30px;

    box-shadow:
    0 12px 25px rgba(45,140,255,.22);
}

/* Badge */
.badge{
    margin-top:22px;

    display:inline-flex;
    align-items:center;
    gap:8px;

    padding:8px 18px;

    border-radius:30px;

    background:rgba(255,255,255,.55);

    color:#296dff;

    font-size:13px;
    font-weight:600;
}

.badge span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#296dff;
}

h1{
    margin-top:25px;

    font-size:clamp(28px,5vw,42px);

    color:#162033;

    font-weight:600;
}

.desc{
    margin-top:18px;

    color:#5f6f86;

    font-size:clamp(14px,2vw,16px);

    line-height:1.8;

    max-width:470px;
    margin-left:auto;
    margin-right:auto;
}

.line{
    margin:32px auto;
    height:1px;
    background:rgba(0,0,0,.08);
    width:100%;
}

/* Email */
.email{
    display:inline-flex;
    align-items:center;
    gap:10px;

    text-decoration:none;

    color:#0c4ca3;

    font-weight:500;

    font-size:clamp(14px,2vw,16px);

    margin-bottom:28px;

    word-break:break-word;
}

.email:hover{
    text-decoration:underline;
}

/* Button */
.btn{
    display:inline-flex;
    align-items:center;
    gap:10px;

    text-decoration:none;

    background:#0c4ca3;
    color:#fff;

    padding:14px 28px;

    border-radius:12px;

    font-size:14px;
    font-weight:500;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

@media(max-width:480px){

    body{
        padding:15px;
    }

    .icon-box{
        width:65px;
        height:65px;
        font-size:25px;
    }

    .btn{
        width:100%;
        justify-content:center;
    }

    .email{
        justify-content:center;
        text-align:center;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="icon-box">
            <i class="fa-regular fa-clock"></i>
        </div>

        <div class="badge">
            <span></span>
            Scheduled Maintenance
        </div>

        <h1>We'll be back soon</h1>

        <div class="desc">
            Our platform is currently undergoing scheduled maintenance
            to improve performance, security and reliability.
            Please check back shortly.
        </div>

        <div class="line"></div>

        <a href="mailto:contact@shivaaytech.in" class="email">
            <i class="fa-solid fa-envelope"></i>
            contact@shivaaytech.in
        </a>

        <br>

        <a href="https://shivaaytech.in" class="btn">
            <i class="fa-solid fa-house"></i>
            Return to Website
        </a>

    </div>

</div>

</body>
</html>
